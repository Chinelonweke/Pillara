[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    security: marks tests as security-critical (run these first in CI)

# Environment variables for the test database
# Override DATABASE_URL to point at a separate test database
env =
    ENVIRONMENT=development
    DEBUG=true
    DATABASE_URL=postgresql://pillara_user:pillara_pass@localhost:5432/pillara_test_db
    REDIS_URL=redis://localhost:6379/1